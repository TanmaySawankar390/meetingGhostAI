services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-bolchal.duckdns.org}
    depends_on:
      - frontend
      - backend

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./backend:/app/backend
      - ./ai_prompts:/app/ai_prompts
    depends_on:
      - postgres
      - redis
      - livekit

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_LIVEKIT_URL: wss://${DOMAIN:-bolchal.duckdns.org}
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-bolchal.duckdns.org}
    restart: unless-stopped
    environment:
      # These must be baked in or available at runtime for Next.js
      - NEXT_PUBLIC_LIVEKIT_URL=wss://${DOMAIN:-bolchal.duckdns.org}
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-bolchal.duckdns.org}
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-prod_strong_password}
      - POSTGRES_DB=meetingghost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Exposing the port is optional in production, better kept internal, but included for debug
    ports:
      - "5432:5432"

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: "host" # Crucial for WebRTC UDP performance and IP discovery
    volumes:
      - ./livekit-prod.yaml:/etc/livekit.yaml

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
